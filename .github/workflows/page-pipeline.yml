name: Page Pipeline (Convergent CPP)

# Triggers :
#  1. workflow_dispatch  — manual run with --slug / --type
#  2. schedule           — daily cron at 06:00 UTC, --detect-changes auto
#  3. push to main       — when src/data/landings-v2/* changes (run gates only)
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Single page slug to process (e.g. ppm). Empty = all."
        required: false
        type: string
      type:
        description: "Page type filter (lp / produit / solution / equipe / blog). Empty = all landings."
        required: false
        type: string
  schedule:
    # 06:00 UTC daily — detects pages whose Supabase row changed since last run
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "src/data/landings-v2/**"
      - "src/data/blog-articles-v2.ts"
      - "scripts/qa-renderer-ds.mjs"

jobs:
  pipeline:
    name: Run convergent page pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Anthropic API key present
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is required for extract/audit/refine stages"
            exit 1
          fi

      - name: Run pipeline (manual, with filters)
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.slug }}" ]; then ARGS="$ARGS --slug=${{ inputs.slug }}"; fi
          if [ -n "${{ inputs.type }}" ]; then ARGS="$ARGS --type=${{ inputs.type }}"; fi
          node scripts/migrate/run-pipeline.mjs $ARGS

      - name: Run pipeline (cron, detect changed pages)
        if: github.event_name == 'schedule'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/migrate/run-pipeline.mjs --detect-changes

      - name: Run gates only (push, no API call)
        if: github.event_name == 'push'
        run: |
          node scripts/qa-renderer-ds.mjs --strict
          # Re-run verify on existing extracts to catch new fabrications
          node scripts/migrate/verify-ground-truth.mjs

      - name: Diff outputs
        if: github.event_name != 'push'
        run: |
          git status
          git diff --stat HEAD || true

      - name: Commit + open PR (if pipeline produced changes)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="cpp/auto-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add docs/raw/llm-test docs/raw/llm-verify docs/raw/llm-audit docs/raw/llm-pipeline docs/qa-flagged.md docs/qa-renderer-ds.md src/data/landings-v2 || true
          git commit -m "chore(cpp): pipeline run ${{ github.run_id }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "CPP pipeline run ${{ github.run_id }}" \
            --body "Auto-generated by .github/workflows/page-pipeline.yml. Review docs/qa-flagged.md for designer gate." \
            --base main \
            --head "$BRANCH"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            docs/raw/llm-test
            docs/raw/llm-verify
            docs/raw/llm-audit
            docs/raw/llm-pipeline
            docs/qa-flagged.md
            docs/qa-renderer-ds.md
